<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panduan Kotama Warehouse</title>
    <style>
        body { 
            background-color: #f5f7fa; /* Warna background abu-abu terang */
            margin: 0; 
            padding: 20px 10px; 
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 800px; /* Batas lebar gambar agar tidak terlalu raksasa di layar PC */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px; /* Jarak antar gambar */
        }
        img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Efek bayangan biar elegan */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="/panduan_1.png" alt="Panduan Halaman 1">
        
        <img src="/panduan_2.png" alt="Panduan Halaman 2">
    </div>

</body>
</html>
